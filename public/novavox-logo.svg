<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 650" fill="white">
  <!-- NV Monogram - faithful recreation -->
  <g transform="translate(250, 0)">
    <!-- N: Left vertical bar -->
    <rect x="-75" y="30" width="38" height="250" rx="0"/>
    <!-- N: Right vertical bar -->
    <rect x="37" y="30" width="38" height="250" rx="0"/>
    <!-- N: Top connecting curve -->
    <path d="M-75,30 L-75,30 Q-75,0 -45,0 L45,0 Q75,0 75,30 L75,50 L37,50 L37,38 Q37,32 31,32 L-31,32 Q-37,32 -37,38 L-37,50 L-75,50 Z"/>
    <!-- N: Inner notch (the gap at top center) -->
    <rect x="-37" y="0" width="74" height="50" fill="black"/>
    <path d="M-37,30 Q-37,10 -17,10 L17,10 Q37,10 37,30 L37,50 L-37,50 Z"/>

    <!-- V: Two diagonal strokes meeting at bottom point -->
    <path d="
      M-75,280
      L-75,310
      L-15,480
      Q0,520 0,520
      Q0,520 15,480
      L75,310
      L75,280
      L37,280
      L37,300
      L5,430
      Q0,448 0,448
      Q0,448 -5,430
      L-37,300
      L-37,280
      Z
    "/>
  </g>

  <!-- NOVAVOX wordmark -->
  <text x="250" y="600" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="30" font-weight="300" letter-spacing="18" fill="white">NOVAVOX</text>
</svg>
