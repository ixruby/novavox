<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="white">
  <!-- NV Monogram Mark - compact for favicon -->
  <g transform="translate(100, 0)">
    <!-- N: Left vertical -->
    <rect x="-65" y="20" width="32" height="100"/>
    <!-- N: Right vertical -->
    <rect x="33" y="20" width="32" height="100"/>
    <!-- N: Top curve connecting left and right -->
    <path d="M-65,20 Q-65,0 -40,0 L40,0 Q65,0 65,20 L65,40 L33,40 L33,25 Q33,18 26,18 L-26,18 Q-33,18 -33,25 L-33,40 L-65,40 Z"/>

    <!-- V: Two strokes meeting at point -->
    <path d="
      M-65,130
      L-65,148
      L-12,260
      Q0,280 0,280
      Q0,280 12,260
      L65,148
      L65,130
      L33,130
      L33,140
      L4,235
      Q0,245 0,245
      Q0,245 -4,235
      L-33,140
      L-33,130
      Z
    "/>
  </g>
</svg>
