<!DOCTYPE html>
<html>
<head>
  <title>NOVAVOX Logo Assets</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: white; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
    h1 { text-align: center; padding: 40px 20px 10px; font-size: 13px; letter-spacing: 0.5em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .sub { text-align: center; font-size: 10px; color: rgba(255,255,255,0.15); letter-spacing: 0.2em; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; padding: 0 40px 40px; max-width: 1200px; margin: 0 auto; }
    .card { border: 1px solid rgba(255,255,255,0.08); padding: 30px; text-align: center; }
    .card h3 { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 20px; }
    .card.dark { background: #0e0e0e; }
    .card.light { background: #ffffff; }
    .card.checker { background: repeating-conic-gradient(#2a2a2a 0% 25%, #1a1a1a 0% 50%) 0 0 / 16px 16px; }
    .card img { max-width: 100%; height: auto; }
    .sizes { display: flex; gap: 16px; justify-content: center; align-items: end; flex-wrap: wrap; margin-top: 16px; }
    .size-box { text-align: center; }
    .size-box img { border: 1px solid rgba(255,255,255,0.1); }
    .size-box span { display: block; font-size: 9px; color: rgba(255,255,255,0.25); margin-top: 6px; }
    .full { grid-column: 1 / -1; }
  </style>
</head>
<body>
  <h1>Novavox Logo Assets</h1>
  <p class="sub">Transparent PNGs — ready for favicon, social, print</p>

  <div class="grid">
    <div class="card dark">
      <h3>Full Logo — Dark BG</h3>
      <img src="/novavox-logo-transparent.png" style="width: 320px;">
    </div>

    <div class="card light">
      <h3>Full Logo — Light BG (inverted)</h3>
      <img src="/novavox-logo-transparent.png" style="width: 320px; filter: invert(1);">
    </div>

    <div class="card checker">
      <h3>Full Logo — Transparency Check</h3>
      <img src="/novavox-logo-transparent.png" style="width: 320px;">
    </div>

    <div class="card dark">
      <h3>NV Mark — Favicon Source</h3>
      <img src="/novavox-mark-512.png" style="width: 180px;">
      <div class="sizes">
        <div class="size-box">
          <img src="/favicon-16.png" width="16" height="16">
          <span>16px</span>
        </div>
        <div class="size-box">
          <img src="/favicon-32.png" width="32" height="32">
          <span>32px</span>
        </div>
        <div class="size-box">
          <img src="/apple-touch-icon.png" width="48" height="48">
          <span>180px (shown 48)</span>
        </div>
      </div>
    </div>

    <div class="card dark">
      <h3>Cropped — No Padding</h3>
      <img src="/novavox-logo-cropped.png" style="width: 240px;">
    </div>

    <div class="card light">
      <h3>Cropped — Inverted</h3>
      <img src="/novavox-logo-cropped.png" style="width: 240px; filter: invert(1);">
    </div>
  </div>
</body>
</html>
